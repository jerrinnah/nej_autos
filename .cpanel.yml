---
deployment:
  tasks:
    # $HOME is set to /home/<your-cpanel-user> automatically when cPanel runs
    # the deploy, so this works for the primary domain without hardcoding a name.
    # For an addon/subdomain, change to e.g. $HOME/nejautos.com/ instead.
    - export DEPLOYPATH=$HOME/public_html/
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp index.html            $DEPLOYPATH
    - /bin/cp styles.css            $DEPLOYPATH
    - /bin/cp portal.html           $DEPLOYPATH
    - /bin/cp portal.css            $DEPLOYPATH
    - /bin/cp portal.js             $DEPLOYPATH
    - /bin/cp car.html              $DEPLOYPATH
    - /bin/cp car.js                $DEPLOYPATH
    - /bin/cp manifest.webmanifest  $DEPLOYPATH
    - /bin/cp sw.js                 $DEPLOYPATH
    - /bin/cp icon.svg              $DEPLOYPATH
